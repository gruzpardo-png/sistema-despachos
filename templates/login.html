{% extends "base.html" %}
{% block content %}
<section class="login-wrap">
  <div class="login-card">
    <img class="login-logo" src="{{ url_for('static', filename='logo.png') }}" alt="Ferretería San Pedro" onerror="this.style.display='none'">
    <h1>Ingreso al sistema</h1>
    <p>Registros de entregas, retiros y documentos pendientes.</p>

    <form method="post" class="form">
      <label>Usuario</label>
      <input name="username" autocomplete="username" required placeholder="admin">

      <label>Clave</label>
      <input name="password" type="password" autocomplete="current-password" required placeholder="••••••••">

      <button class="btn primary" type="submit">Ingresar</button>
    </form>

    <div class="hint">
      Usuario inicial: <strong>admin</strong> · Clave inicial: <strong>admin123</strong><br>
      Luego cambia estas credenciales en Render usando ADMIN_USERNAME y ADMIN_PASSWORD.
    </div>
  </div>
</section>
{% endblock %}
