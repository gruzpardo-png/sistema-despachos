services:
  - type: web
    name: despachos-ferreteria-san-pedro
    env: python
    runtime: python-3.11.9
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: CambiarEstaClave123
      - key: ADMIN_NAME
        value: ADMINISTRADOR
      - key: DATABASE_URL
        fromDatabase:
          name: despachos-db
          property: connectionString

databases:
  - name: despachos-db
    plan: free
