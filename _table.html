<section class="summary-grid">
  <article class="metric"><span>Total</span><strong>{{ summary.total }}</strong><small>registros filtrados</small></article>
  <article class="metric warning"><span>Pendientes</span><strong>{{ summary.pending }}</strong><small>requieren seguimiento</small></article>
  <article class="metric ok"><span>Entregados</span><strong>{{ summary.delivered }}</strong><small>cerrados/retiros</small></article>
  <article class="metric money-card"><span>Monto</span><strong>{{ money(summary.amount) }}</strong><small>sin anulados</small></article>
  <article class="metric danger"><span>Anulados</span><strong>{{ summary.cancelled }}</strong><small>con motivo</small></article>
</section>
